<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}SmartPOS{% endblock %}</title>

<link href="https://rsms.me/inter/inter.css" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
    --bg:#f3f5fa;
    --sidebar:#0b1220;
    --sidebar-soft:#111a32;

    --primary:#6366f1;
    --primary-soft:rgba(99,102,241,.15);

    --text:#0f172a;
    --muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
}

/* ================= LAYOUT ================= */

.app{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:260px;
    background:linear-gradient(180deg,#0b1220,#101a33);
    color:white;
    display:flex;
    flex-direction:column;
}

/* BUSINESS HEADER */

.account{
    padding:26px 22px;
}

.business{
    font-size:20px;
    font-weight:700;
    letter-spacing:.4px;
}

.user-line{
    margin-top:8px;
    font-size:13px;
    color:#cbd5e1;
    display:flex;
    align-items:center;
    gap:10px;
}

.role{
    background:var(--primary);
    padding:3px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:600;
}

/* ================= NAV AREA ================= */

.nav-area{
    flex:1;
    padding:10px 14px;
    overflow-y:auto;
}

.nav-section{
    margin-top:18px;
}

.nav-title{
    font-size:11px;
    color:#7c8aa5;
    letter-spacing:.8px;
    text-transform:uppercase;
    margin:14px 10px 6px;
}

/* NAV LINKS */

.nav{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.nav a{
    text-decoration:none;
    color:#cbd5e1;
    padding:11px 14px;
    border-radius:10px;
    font-size:14px;
    transition:.2s;
}

/* hover */
.nav a:hover{
    background:rgba(255,255,255,.06);
}

/* ACTIVE STYLE (MATCHES SCREENSHOT) */
.nav a.active{
    background:var(--primary-soft);
    color:white;
    font-weight:600;
    box-shadow:inset 0 0 0 1px rgba(99,102,241,.35);
}

/* ================= LOGOUT ================= */

.logout-area{
    padding:14px;
    border-top:1px solid rgba(255,255,255,.06);
}

.logout{
    display:block;
    text-decoration:none;
    color:#fca5a5;
    padding:11px 14px;
    border-radius:10px;
    font-size:14px;
}

.logout:hover{
    background:rgba(239,68,68,.15);
}

/* ================= MAIN ================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.topbar{
    background:white;
    padding:22px 30px;
    border-bottom:1px solid #e5e7eb;
}

.page-title{
    font-size:22px;
    font-weight:600;
    color:var(--text);
}

.business-sub{
    font-size:14px;
    color:var(--muted);
    margin-top:4px;
}

.content{
    padding:30px;
    overflow-y:auto;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.sidebar{
    width:72px;
}

.account,
.nav-title,
.nav a span{
    display:none;
}

}

</style>
</head>

<body>

<div class="app">

<!-- ================= SIDEBAR ================= -->

<aside class="sidebar">

<div class="account">
    <div class="business">{{ business }}</div>

    <div class="user-line">
        {{ username }}
        <span class="role">{{ role }}</span>
    </div>
</div>

<div class="nav-area">

<!-- OVERVIEW -->
<div class="nav-section">
<div class="nav-title">Overview</div>
<nav class="nav">
<a href="/auth/dashboard"
class="{% if active_page=='dashboard' %}active{% endif %}">
Dashboard
</a>
</nav>
</div>

<!-- SALES -->
<div class="nav-section">
<div class="nav-title">Sales</div>
<nav class="nav">
<a href="/sales/recordsale"
class="{% if active_page=='sales' %}active{% endif %}">
Record Sale
</a>

<a href="/sales/returns"
class="{% if active_page=='returns' %}active{% endif %}">
Sales Return
</a>
</nav>
</div>

<!-- INVENTORY -->
<div class="nav-section">
<div class="nav-title">Inventory</div>
<nav class="nav">

<a href="/products/viewstocks"
class="{% if active_page=='products' %}active{% endif %}">
View Products
</a>

<a href="/products/addproduct"
class="{% if active_page=='add_product' %}active{% endif %}">
Add Product
</a>

</nav>
</div>

<!-- MANAGEMENT -->
<div class="nav-section">
<div class="nav-title">Management</div>
<nav class="nav">

<a href="/sales/salesreport"
class="{% if active_page=='reports' %}active{% endif %}">
Reports
</a>

<a href="/auth/manage_staff"
class="{% if active_page=='staff' %}active{% endif %}">
Staff
</a>

</nav>
</div>

</div>

<div class="logout-area">
<a href="/auth/logout" class="logout">Logout</a>
</div>

</aside>

<!-- ================= MAIN ================= -->

<div class="main">

<header class="topbar">
<div class="page-title">
{% block page_title %}Dashboard{% endblock %}
</div>

<div class="business-sub">
{{ business }}
</div>
</header>

<main class="content">
{% block content %}{% endblock %}
</main>

</div>

</div>

</body>
</html>
