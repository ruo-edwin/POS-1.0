<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}SmartPOS{% endblock %}</title>

<link href="https://rsms.me/inter/inter.css" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
    --bg:#f4f6fb;
    --sidebar:#0b1220;
    --sidebar-2:#0f172a;

    --primary:#635bff;
    --primary-soft:rgba(99,91,255,.16);

    --text:#0f172a;
    --muted:#94a3b8;
    --border:#e5e7eb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
}

/* ================= LAYOUT ================= */

.app{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:260px;
    background:linear-gradient(180deg,#0b1220,#111c34);
    color:white;
    display:flex;
    flex-direction:column;
    border-right:1px solid rgba(255,255,255,.05);
}

/* ACCOUNT HEADER */

.account{
    padding:26px 22px;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.business{
    font-size:20px;
    font-weight:700;
    letter-spacing:.4px;
}

.user-row{
    margin-top:6px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:#cbd5e1;
}

.role{
    background:var(--primary);
    padding:3px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:600;
}

/* ================= NAV ================= */

.nav-area{
    flex:1;
    overflow-y:auto;
    padding:18px 14px;
}

.nav-section{
    margin-bottom:22px;
}

.nav-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.8px;
    color:#7c8aa5;
    padding:6px 10px;
}

.nav{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.nav a{
    text-decoration:none;
    color:#cbd5e1;
    padding:11px 14px;
    border-radius:10px;
    font-size:14px;
    position:relative;
    transition:.2s;
}

/* hover */
.nav a:hover{
    background:rgba(255,255,255,.06);
}

/* ACTIVE PAGE (🔥 IMPORTANT FIX) */
.nav a.active{
    background:var(--primary-soft);
    color:white;
    font-weight:600;
}

/* LEFT INDICATOR BAR */
.nav a.active::before{
    content:"";
    position:absolute;
    left:-14px;
    top:7px;
    bottom:7px;
    width:3px;
    background:var(--primary);
    border-radius:4px;
}

/* ================= LOGOUT ================= */

.logout-area{
    padding:14px;
    border-top:1px solid rgba(255,255,255,.05);
}

.logout-btn{
    display:block;
    text-decoration:none;
    color:#fca5a5;
    padding:11px 14px;
    border-radius:10px;
    font-size:14px;
}

.logout-btn:hover{
    background:rgba(239,68,68,.15);
}

/* ================= MAIN ================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.topbar{
    background:white;
    border-bottom:1px solid var(--border);
    padding:22px 32px;
}

.page-title{
    font-size:22px;
    font-weight:600;
    color:var(--text);
}

.business-sub{
    font-size:14px;
    color:var(--muted);
    margin-top:4px;
}

.content{
    padding:32px;
    overflow-y:auto;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.sidebar{
    width:74px;
}

.account,
.nav-title,
.nav a span{
    display:none;
}

}

</style>
</head>

<body>

<div class="app">

<!-- ================= SIDEBAR ================= -->

<aside class="sidebar">

    <!-- ACCOUNT -->
    <div class="account">
        <div class="business">{{ business }}</div>

        <div class="user-row">
            <span>{{ username }}</span>
            <span class="role">{{ role }}</span>
        </div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav-area">

        <!-- OVERVIEW -->
        <div class="nav-section">
            <div class="nav-title">Overview</div>
            <nav class="nav">
                <a href="/auth/dashboard"
                   class="{% if active_page=='dashboard' %}active{% endif %}">
                   Dashboard
                </a>
            </nav>
        </div>

        <!-- SALES -->
        <div class="nav-section">
            <div class="nav-title">Sales</div>
            <nav class="nav">
                <a href="/sales/recordsale"
                   class="{% if active_page=='sales' %}active{% endif %}">
                   Record Sale
                </a>

                <a href="/sales/returns"
                   class="{% if active_page=='returns' %}active{% endif %}">
                   Sales Return
                </a>
            </nav>
        </div>

        <!-- INVENTORY -->
        <div class="nav-section">
            <div class="nav-title">Inventory</div>
            <nav class="nav">
                <a href="/products/viewstocks"
                   class="{% if active_page=='products' %}active{% endif %}">
                   View Products
                </a>

                <a href="/products/addproduct"
                   class="{% if active_page=='add_product' %}active{% endif %}">
                   Add Product
                </a>
            </nav>
        </div>

        <!-- MANAGEMENT -->
        <div class="nav-section">
            <div class="nav-title">Management</div>
            <nav class="nav">
                <a href="/sales/salesreport"
                   class="{% if active_page=='reports' %}active{% endif %}">
                   Reports
                </a>

                <a href="/auth/manage_staff"
                   class="{% if active_page=='staff' %}active{% endif %}">
                   Staff
                </a>
            </nav>
        </div>

    </div>

    <!-- LOGOUT -->
    <div class="logout-area">
        <a href="/auth/logout" class="logout-btn">
            Logout
        </a>
    </div>

</aside>


<!-- ================= MAIN ================= -->

<div class="main">

<header class="topbar">
    <div class="page-title">
        {% block page_title %}Dashboard{% endblock %}
    </div>

    <div class="business-sub">
        {{ business }}
    </div>
</header>

<main class="content">
{% block content %}{% endblock %}
</main>

</div>

</div>

</body>
</html>
