<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}SmartPOS{% endblock %}

<link href="https://rsms.me/inter/inter.css" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
    --bg:#f5f7fb;
    --sidebar:#0b1220;
    --sidebar-soft:#111a2e;
    --card:#ffffff;
    --border:#e6ebf1;

    --text:#111827;
    --muted:#9aa4b2;

    --primary:#635bff;
    --primary-soft:rgba(99,91,255,0.15);

    --danger:#ef4444;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* ================= LAYOUT ================= */

.app{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:260px;
    background:linear-gradient(180deg,#0b1220,#0f1b33);
    color:white;
    display:flex;
    flex-direction:column;
    padding:26px 18px;
    border-right:1px solid rgba(255,255,255,0.05);
}

/* ===== BUSINESS IDENTITY ===== */

.identity{
    margin-bottom:28px;
}

.business{
    font-size:18px;
    font-weight:700;
    letter-spacing:.4px;
    margin-bottom:6px;
}

.user-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:#cbd5e1;
}

.role{
    background:var(--primary);
    padding:3px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
}

/* ================= NAV GROUP ================= */

.nav-section{
    margin-top:22px;
}

.nav-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.8px;
    color:#7c8aa5;
    margin:10px 10px 8px;
}

.nav{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.nav a{
    text-decoration:none;
    color:#cbd5e1;
    padding:10px 14px;
    border-radius:10px;
    position:relative;
    font-size:14px;
    transition:.2s;
}

/* hover */
.nav a:hover{
    background:rgba(255,255,255,0.06);
}

/* ACTIVE PAGE INDICATOR */
.nav a.active{
    background:var(--primary-soft);
    color:white;
}

.nav a.active::before{
    content:"";
    position:absolute;
    left:-18px;
    top:6px;
    bottom:6px;
    width:3px;
    border-radius:3px;
    background:var(--primary);
}

/* logout styling */
.nav a.logout{
    margin-top:18px;
    color:#fca5a5;
}

.nav a.logout:hover{
    background:rgba(239,68,68,0.15);
}

/* ================= MAIN ================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* ===== TOPBAR ===== */

.topbar{
    background:white;
    border-bottom:1px solid var(--border);
    padding:20px 30px;
}

.page-title{
    font-size:22px;
    font-weight:600;
}

.business-sub{
    color:var(--muted);
    font-size:14px;
    margin-top:3px;
}

/* ===== CONTENT ===== */

.content{
    padding:30px;
    overflow-y:auto;
}

/* ================= CARDS ================= */

.card{
    background:white;
    border-radius:16px;
    padding:22px;
    border:1px solid rgba(0,0,0,0.05);
    box-shadow:0 10px 24px rgba(0,0,0,0.04);
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.sidebar{
    width:74px;
}

.identity,
.nav-title,
.nav a span{
    display:none;
}

}

</style>
</head>

<body>

<div class="app">

<!-- ================= SIDEBAR ================= -->

<aside class="sidebar">

    <!-- BUSINESS IDENTITY -->
    <div class="identity">
        <div class="business">{{ business }}</div>

        <div class="user-row">
            <span>{{ username }}</span>
            <span class="role">{{ role }}</span>
        </div>
    </div>

    <!-- ===== OVERVIEW ===== -->
    <div class="nav-section">
        <div class="nav-title">Overview</div>
        <nav class="nav">
            <a href="/auth/dashboard"
               class="{% if request.url.path == '/auth/dashboard' %}active{% endif %}">
               <span>Dashboard</span>
            </a>
        </nav>
    </div>

    <!-- ===== SALES ===== -->
    <div class="nav-section">
        <div class="nav-title">Sales</div>
        <nav class="nav">
            <a href="/sales/recordsale"> <span>Record Sale</span></a>
            <a href="/sales/returns"> <span>Sales Return</span></a>
        </nav>
    </div>

    <!-- ===== INVENTORY ===== -->
    <div class="nav-section">
        <div class="nav-title">Inventory</div>
        <nav class="nav">
            <a href="/products/viewstocks"><span>View Products</span></a>
            <a href="/products/addproduct"><span>Add Product</span></a>
        </nav>
    </div>

    <!-- ===== MANAGEMENT ===== -->
    <div class="nav-section">
        <div class="nav-title">Management</div>
        <nav class="nav">
            <a href="/sales/salesreport"><span>Reports</span></a>
            <a href="/auth/manage_staff"><span>Staff</span></a>
        </nav>
    </div>

    <!-- LOGOUT -->
    <nav class="nav">
        <a href="/auth/logout" class="logout">
            <span>Logout</span>
        </a>
    </nav>

</aside>


<!-- ================= MAIN ================= -->

<div class="main">

<header class="topbar">
    <div class="page-title">
        {% block page_title %}Dashboard{% endblock %}
    </div>

    <div class="business-sub">
        {{ business }}
    </div>
</header>

<main class="content">
    {% block content %}{% endblock %}
</main>

</div>

</div>

</body>
</html>
