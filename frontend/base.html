<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}SmartPOS{% endblock %}</title>

<link href="https://rsms.me/inter/inter.css" rel="stylesheet">

{% block extra_head %}{% endblock %}

<style>

/* ================= ROOT ================= */

:root{
    --bg:#f6f8fc;
    --sidebar:#0b1220;
    --card:#ffffff;
    --border:#e6ebf1;
    --text:#111827;
    --muted:#6b7280;

    --primary:#635bff;
    --primary-soft:rgba(99,91,255,0.14);

    --danger:#ef4444;
}

/* ================= RESET ================= */

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* ================= APP LAYOUT ================= */

.app{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:250px;
    background:var(--sidebar);
    color:white;
    display:flex;
    flex-direction:column;
    padding:26px 20px;
}

/* BRAND */

.brand{
    font-size:21px;
    font-weight:700;
    letter-spacing:.4px;
    margin-bottom:34px;
    opacity:.95;
}

/* ================= IDENTITY ================= */

.identity{
    padding:16px;
    border-radius:14px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.06);
    margin-bottom:30px;
}

/* BUSINESS (MAIN EMPHASIS) */

.identity .business{
    font-size:16px;
    font-weight:700;
    letter-spacing:.02em;
    margin-bottom:4px;
}

/* USERNAME */

.identity .username{
    font-size:13px;
    color:#cbd5e1;
}

/* ROLE BADGE */

.identity .role{
    display:inline-block;
    margin-top:8px;
    font-size:11px;
    padding:4px 10px;
    border-radius:20px;
    background:var(--primary-soft);
    color:#c7d2fe;
    font-weight:600;
    letter-spacing:.04em;
    text-transform:uppercase;
}

/* ================= NAVIGATION ================= */

.nav{
    display:flex;
    flex-direction:column;
    gap:6px;
    flex:1;
}

.nav a{
    text-decoration:none;
    color:#cbd5e1;
    padding:11px 14px;
    border-radius:10px;
    font-size:14px;
    transition:.18s ease;
}

.nav a:hover{
    background:rgba(255,255,255,0.06);
    color:white;
}

.nav a.active{
    background:var(--primary-soft);
    color:white;
    font-weight:600;
}

/* ================= LOGOUT ================= */

.logout{
    margin-top:auto;
    border-top:1px solid rgba(255,255,255,0.08);
    padding-top:16px;
}

.logout a{
    text-decoration:none;
    color:#fca5a5;
    font-size:14px;
    font-weight:600;
    transition:.2s;
}

.logout a:hover{
    color:#ef4444;
}

/* ================= MAIN ================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* TOPBAR */

.topbar{
    background:white;
    border-bottom:1px solid var(--border);
    padding:20px 30px;
}

.page-title{
    font-size:20px;
    font-weight:600;
}

.business-name{
    font-size:13px;
    color:var(--muted);
    margin-top:3px;
}

/* CONTENT */

.content{
    padding:30px;
    overflow-y:auto;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

    .sidebar{
        width:70px;
    }

    .brand,
    .identity,
    .nav a span{
        display:none;
    }
}

</style>
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="brand">SmartPOS</div>

        <!-- PREMIUM IDENTITY -->
        <div class="identity">
            <div class="business">{{ business or "" }}</div>
            <div class="username">{{ username or "" }}</div>
            <div class="role">{{ role or "" }}</div>
        </div>

        <!-- NAV -->
        <nav class="nav">
            <a href="/auth/dashboard">Dashboard</a>
            <a href="/sales/recordsale">Sales</a>
            <a href="/products/viewstocks">Products</a>
            <a href="/sales/salesreport">Reports</a>
            <a href="/auth/manage_staff">Staff</a>
            <a href="/settings">Settings</a>
        </nav>

        <!-- LOGOUT -->
        <div class="logout">
            <a href="/auth/logout">Logout</a>
        </div>

    </aside>

    <!-- MAIN -->
    <div class="main">

        <header class="topbar">
            <div class="page-title">
                {% block page_title %}Dashboard{% endblock %}
            </div>

            <div class="business-name">
                {{ business or "" }}
            </div>
        </header>

        <main class="content">
            {% block content %}{% endblock %}
        </main>

    </div>

</div>

</body>
</html>
