<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}SmartPOS{% endblock %}</title>

<link href="https://rsms.me/inter/inter.css" rel="stylesheet">

{% block extra_head %}{% endblock %}

<style>

/* ================= ROOT ================= */

:root{
    --bg:#f4f6fb;
    --sidebar:#0b1324;
    --sidebar-2:#0f1a33;
    --card:#ffffff;
    --border:#e5e9f2;
    --text:#111827;
    --muted:#8a94a6;

    --primary:#6366f1;
    --primary-soft:rgba(99,102,241,.18);
}

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* ================= LAYOUT ================= */

.app{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:260px;
    background:linear-gradient(180deg,var(--sidebar),var(--sidebar-2));
    color:white;
    display:flex;
    flex-direction:column;
    padding:26px 20px;
}

/* BRAND */

.brand{
    font-size:22px;
    font-weight:700;
    letter-spacing:.4px;
    margin-bottom:28px;
}

/* ================= IDENTITY ================= */

.identity{
    padding:16px;
    border-radius:14px;
    background:rgba(255,255,255,.05);
    margin-bottom:26px;
}

/* BUSINESS NAME (BIGGEST) */

.business{
    font-size:17px;
    font-weight:700;
    letter-spacing:.02em;
}

/* USER + ROLE ROW */

.user-row{
    margin-top:6px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:#cbd5e1;
}

/* ROLE BADGE */

.role{
    font-size:10px;
    padding:3px 8px;
    border-radius:20px;
    background:var(--primary-soft);
    color:#c7d2fe;
    font-weight:600;
    text-transform:uppercase;
}

/* ================= NAV SECTIONS ================= */

.nav-section{
    margin-top:14px;
}

.nav-title{
    font-size:11px;
    letter-spacing:.12em;
    color:#7c86a2;
    margin:16px 8px 6px;
}

/* NAV LINKS */

.nav a{
    display:block;
    text-decoration:none;
    color:#cbd5e1;
    padding:10px 14px;
    border-radius:10px;
    font-size:14px;
    transition:.18s;
}

.nav a:hover{
    background:rgba(255,255,255,.06);
    color:white;
}

.nav a.active{
    background:var(--primary-soft);
    color:white;
    font-weight:600;
}

/* LOGOUT */

.logout{
    margin-top:auto;
    padding-top:18px;
}

.logout a{
    display:block;
    padding:10px 14px;
    border-radius:10px;
    text-decoration:none;
    color:#fca5a5;
}

.logout a:hover{
    background:rgba(255,255,255,.06);
    color:#ef4444;
}

/* ================= MAIN ================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.topbar{
    background:white;
    border-bottom:1px solid var(--border);
    padding:20px 30px;
}

.page-title{
    font-size:20px;
    font-weight:600;
}

.business-sub{
    font-size:13px;
    color:var(--muted);
    margin-top:4px;
}

.content{
    padding:30px;
    overflow-y:auto;
}

/* MOBILE */

@media(max-width:900px){
    .sidebar{
        width:70px;
    }
    .identity,.nav-title,.brand{
        display:none;
    }
}

</style>
</head>

<body>

<div class="app">

<!-- ================= SIDEBAR ================= -->

<aside class="sidebar">

<div class="brand">SmartPOS</div>

<!-- USER IDENTITY -->
<div class="identity">
    <div class="business">{{ business }}</div>

    <div class="user-row">
        <span>{{ username }}</span>
        <span class="role">{{ role }}</span>
    </div>
</div>

<nav class="nav">

<!-- OVERVIEW -->
<div class="nav-section">
<div class="nav-title">OVERVIEW</div>

<a href="/auth/dashboard"
class="{% if request.url.path.startswith('/auth/dashboard') %}active{% endif %}">
Dashboard
</a>
</div>

<!-- INVENTORY -->
<div class="nav-section">
<div class="nav-title">INVENTORY</div>

<a href="/products/viewstocks"
class="{% if request.url.path.startswith('/products') %}active{% endif %}">
Stocks
</a>
</div>

<!-- SALES -->
<div class="nav-section">
<div class="nav-title">SALES</div>

<a href="/sales/recordsale"
class="{% if request.url.path.startswith('/sales/recordsale') %}active{% endif %}">
Sales
</a>

<a href="/sales/returns"
class="{% if request.url.path.startswith('/sales/returns') %}active{% endif %}">
Sales Return
</a>
</div>

<!-- MANAGEMENT -->
<div class="nav-section">
<div class="nav-title">MANAGEMENT</div>

<a href="/auth/manage_staff"
class="{% if request.url.path.startswith('/auth/manage_staff') %}active{% endif %}">
Staff
</a>
</div>

</nav>

<!-- LOGOUT -->
<div class="logout">
<a href="/auth/logout">Logout</a>
</div>

</aside>

<!-- ================= MAIN ================= -->

<div class="main">

<header class="topbar">
<div>
<div class="page-title">
{% block page_title %}Dashboard{% endblock %}
</div>

<div class="business-sub">{{ business }}</div>
</div>
</header>

<main class="content">
{% block content %}{% endblock %}
</main>

</div>

</div>

</body>
</html>
