<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}SmartPOS{% endblock %}</title>

<link href="https://rsms.me/inter/inter.css" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
    --bg:#f5f7fb;
    --sidebar:#0e1628;
    --sidebar-soft:#131c33;
    --card:#ffffff;
    --border:#e6ebf1;

    --text:#111827;
    --muted:#94a3b8;

    --primary:#635bff;
    --primary-soft:rgba(99,91,255,0.14);

    --danger:#ef4444;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* ================= LAYOUT ================= */

.app{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:260px;
    background:linear-gradient(180deg,#0e1628,#111c36);
    color:white;
    display:flex;
    flex-direction:column;
    padding:26px 18px;
    border-right:1px solid rgba(255,255,255,0.05);
}

/* ===== BUSINESS IDENTITY ===== */

.identity{
    margin-bottom:30px;
}

.business{
    font-size:19px;
    font-weight:700;
    letter-spacing:.4px;
    margin-bottom:6px;
}

.user-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:#cbd5e1;
}

.role{
    background:var(--primary);
    padding:3px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
}

/* ================= NAVIGATION ================= */

.nav-section{
    margin-top:20px;
}

.nav-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.8px;
    color:#7c8aa5;
    margin:10px 10px 8px;
}

.nav{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.nav a{
    text-decoration:none;
    color:#cbd5e1;
    padding:10px 14px;
    border-radius:10px;
    font-size:14px;
    transition:.2s;
    position:relative;
}

.nav a:hover{
    background:rgba(255,255,255,0.06);
}

.nav a.active{
    background:var(--primary-soft);
    color:white;
}

/* left active indicator */
.nav a.active::before{
    content:"";
    position:absolute;
    left:-18px;
    top:6px;
    bottom:6px;
    width:3px;
    background:var(--primary);
    border-radius:3px;
}

/* logout */
.nav a.logout{
    margin-top:18px;
    color:#fca5a5;
}

.nav a.logout:hover{
    background:rgba(239,68,68,0.15);
}

/* ================= MAIN ================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* TOPBAR */

.topbar{
    background:white;
    border-bottom:1px solid var(--border);
    padding:20px 30px;
}

.page-title{
    font-size:22px;
    font-weight:600;
}

.business-sub{
    font-size:14px;
    color:var(--muted);
    margin-top:4px;
}

/* CONTENT */

.content{
    padding:30px;
    overflow-y:auto;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.sidebar{
    width:74px;
}

.identity,
.nav-title,
.nav a span{
    display:none;
}

}

</style>
</head>

<body>

<div class="app">

<!-- ================= SIDEBAR ================= -->

<aside class="sidebar">

    <!-- Identity -->
    <div class="identity">
        <div class="business">{{ business }}</div>

        <div class="user-row">
            <span>{{ username }}</span>
            <span class="role">{{ role }}</span>
        </div>
    </div>

    <!-- Overview -->
    <div class="nav-section">
        <div class="nav-title">Overview</div>
        <nav class="nav">
            <a href="/auth/dashboard"
               class="{% if active_page == 'dashboard' %}active{% endif %}">
               <span>Dashboard</span>
            </a>
        </nav>
    </div>

    <!-- Sales -->
    <div class="nav-section">
        <div class="nav-title">Sales</div>
        <nav class="nav">
            <a href="/sales/recordsale"
               class="{% if active_page == 'sales' %}active{% endif %}">
               <span>Record Sale</span>
            </a>

            <a href="/sales/returns"
               class="{% if active_page == 'returns' %}active{% endif %}">
               <span>Sales Return</span>
            </a>
        </nav>
    </div>

    <!-- Inventory -->
    <div class="nav-section">
        <div class="nav-title">Inventory</div>
        <nav class="nav">
            <a href="/products/viewstocks"
               class="{% if active_page == 'products' %}active{% endif %}">
               <span>View Products</span>
            </a>

            <a href="/products/addproduct"
               class="{% if active_page == 'add_product' %}active{% endif %}">
               <span>Add Product</span>
            </a>
        </nav>
    </div>

    <!-- Management -->
    <div class="nav-section">
        <div class="nav-title">Management</div>
        <nav class="nav">
            <a href="/sales/salesreport"
               class="{% if active_page == 'reports' %}active{% endif %}">
               <span>Reports</span>
            </a>

            <a href="/auth/manage_staff"
               class="{% if active_page == 'staff' %}active{% endif %}">
               <span>Staff</span>
            </a>
        </nav>
    </div>

    <!-- Logout -->
    <nav class="nav">
        <a href="/auth/logout" class="logout">
            <span>Logout</span>
        </a>
    </nav>

</aside>


<!-- ================= MAIN ================= -->

<div class="main">

<header class="topbar">
    <div class="page-title">
        {% block page_title %}Dashboard{% endblock %}
    </div>

    <div class="business-sub">
        {{ business }}
    </div>
</header>

<main class="content">
    {% block content %}{% endblock %}
</main>

</div>

</div>

</body>
</html>
