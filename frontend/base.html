<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}SmartPOS{% endblock %}</title>

<link href="https://rsms.me/inter/inter.css" rel="stylesheet">

{% block extra_head %}{% endblock %}

<style>

/* ================= ROOT ================= */

:root{
    --bg:#f6f8fc;
    --sidebar:#0f172a;
    --card:#ffffff;
    --border:#e6ebf1;
    --text:#1a1f36;
    --muted:#6b7280;

    --primary:#635bff;
    --primary-soft:rgba(99,91,255,0.12);

    --danger:#ef4444;
}

/* ================= RESET ================= */

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* ================= LAYOUT ================= */

.app{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:240px;
    background:var(--sidebar);
    color:white;
    display:flex;
    flex-direction:column;
    padding:24px 18px;
}

/* BRAND */

.brand{
    font-size:20px;
    font-weight:700;
    margin-bottom:28px;
    letter-spacing:.3px;
}

/* USER IDENTITY (SMALL + CLEAN) */

.identity{
    margin-bottom:28px;
    line-height:1.4;
}

.identity .business{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:#94a3b8;
    font-weight:600;
}

.identity .username{
    font-size:14px;
    font-weight:600;
    margin-top:2px;
}

.identity .role{
    font-size:11px;
    color:#cbd5e1;
    margin-top:2px;
}

/* NAV */

.nav{
    display:flex;
    flex-direction:column;
    gap:6px;
    flex:1;
}

.nav a{
    text-decoration:none;
    color:#cbd5e1;
    padding:10px 14px;
    border-radius:10px;
    font-size:14px;
    transition:.2s;
}

.nav a:hover,
.nav a.active{
    background:var(--primary-soft);
    color:white;
}

/* LOGOUT (BOTTOM) */

.logout{
    margin-top:auto;
    border-top:1px solid rgba(255,255,255,0.08);
    padding-top:14px;
}

.logout a{
    color:#f87171;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
}

/* ================= MAIN ================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* TOPBAR */

.topbar{
    background:white;
    border-bottom:1px solid var(--border);
    padding:18px 28px;
}

.page-title{
    font-size:20px;
    font-weight:600;
}

.business-name{
    font-size:13px;
    color:var(--muted);
    margin-top:2px;
}

/* CONTENT */

.content{
    padding:28px;
    overflow-y:auto;
}

/* CARDS */

.card{
    background:var(--card);
    border-radius:14px;
    padding:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.04);
}

/* GRID */

.grid{
    display:grid;
    gap:20px;
}

.grid-4{
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}

/* ================= MOBILE ================= */

@media(max-width:900px){

    .sidebar{
        width:70px;
    }

    .brand,
    .identity,
    .nav a span{
        display:none;
    }
}

</style>
</head>

<body>

<div class="app">

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">

        <div class="brand">SmartPOS</div>

        <!-- CLEAN IDENTITY -->
        <div class="identity">
            <div class="business">{{ business or "" }}</div>
            <div class="username">{{ username or "" }}</div>
            <div class="role">{{ role or "" }}</div>
        </div>

        <!-- NAVIGATION -->
        <nav class="nav">
            <a href="/auth/dashboard">Dashboard</a>
            <a href="/sales/recordsale">Sales</a>
            <a href="/products/viewstocks">Products</a>
            <a href="/sales/salesreport">Reports</a>
            <a href="/auth/manage_staff">Staff</a>
            <a href="/settings">Settings</a>
        </nav>

        <!-- LOGOUT -->
        <div class="logout">
            <a href="/auth/logout">Logout</a>
        </div>

    </aside>


    <!-- ================= MAIN ================= -->
    <div class="main">

        <header class="topbar">

            <div class="page-title">
                {% block page_title %}Dashboard{% endblock %}
            </div>

            <div class="business-name">
                {{ business or "" }}
            </div>

        </header>

        <!-- PAGE CONTENT -->
        <main class="content">
            {% block content %}{% endblock %}
        </main>

    </div>

</div>

</body>
</html>
