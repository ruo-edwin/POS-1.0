{% extends "base.html" %}

{% block title_suffix %} | Receive Stock{% endblock %}
{% block page_title %}Receive Stock{% endblock %}

{% block content %}

<style>

.panel{
background:#fff;
border:1px solid var(--border);
border-radius:16px;
padding:22px;
box-shadow:0 8px 30px rgba(0,0,0,.05);
}

.row{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.row > *{
flex:1 1 240px;
}

label{
font-size:12px;
font-weight:700;
color:var(--muted);
display:block;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
padding:12px 14px;
border:1px solid var(--border);
border-radius:10px;
font-size:14px;
background:#fff;
transition:.15s;
}

input:focus,select:focus,textarea:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(99,91,255,.1);
}

table{
width:100%;
border-collapse:separate;
border-spacing:0;
margin-top:18px;
}

thead th{
background:#f4f6fc;
color:var(--muted);
font-size:12px;
text-transform:uppercase;
letter-spacing:.08em;
padding:12px;
border-bottom:1px solid var(--border);
}

tbody td{
padding:10px;
border-bottom:1px solid var(--border);
}

.qty,
.bp{
text-align:center;
font-weight:700;
}

.line-total{
font-weight:900;
font-size:15px;
}

.btn{
border:none;
cursor:pointer;
color:#fff;
font-weight:900;
border-radius:999px;
padding:13px 22px;
background:linear-gradient(135deg,var(--primary),var(--primary-2));
}

.btn-lite{
border:1px solid var(--border);
background:#fff;
color:var(--text);
font-weight:700;
border-radius:999px;
padding:9px 16px;
cursor:pointer;
}

.danger{
background:#fee2e2;
color:#b91c1c;
border:none;
border-radius:10px;
padding:8px 12px;
font-weight:900;
cursor:pointer;
}

.total-box{
font-size:18px;
font-weight:900;
}

#toast{
position:fixed;
top:110px;
right:25px;
z-index:9999;
display:flex;
flex-direction:column;
gap:10px;
}

.toast-msg{
min-width:260px;
padding:14px 18px;
border-radius:10px;
font-weight:800;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.toast-success{
background:linear-gradient(135deg,#16a34a,#22c55e);
}

.toast-error{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
backdrop-filter:blur(4px);
display:flex;
align-items:center;
justify-content:center;
z-index:10000;
}

.modal{
background:#fff;
border-radius:16px;
padding:26px;
width:420px;
max-width:90%;
box-shadow:0 25px 60px rgba(0,0,0,.25);
animation:modalIn .18s ease;
}

@keyframes modalIn{
from{transform:translateY(8px);opacity:0}
to{transform:translateY(0);opacity:1}
}

.modal-title{
font-size:18px;
font-weight:900;
margin-bottom:12px;
}

.modal-details{
font-size:14px;
color:var(--muted);
margin-bottom:18px;
line-height:1.6;
}

.modal-row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.modal-total{
font-size:20px;
font-weight:900;
margin-top:10px;
}

.modal-actions{
display:flex;
gap:10px;
margin-top:20px;
justify-content:flex-end;
}

.modal-cancel{
background:#f3f4f6;
border:none;
padding:10px 16px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.modal-confirm{
background:linear-gradient(135deg,var(--primary),var(--primary-2));
border:none;
color:white;
padding:10px 18px;
border-radius:10px;
font-weight:800;
cursor:pointer;
}
</style>


<div id="toast"></div>

<div class="panel">

<div class="row">

<div>
<label>Supplier</label>
<select id="supplierSelect">
<option value="">Walk-in / No Supplier</option>
</select>
</div>

<div>
<label>Invoice Number</label>
<input id="invoiceNumber" placeholder="e.g. INV-1029">
</div>

</div>

<div style="margin-top:14px;">
<label>Notes</label>
<textarea id="notes" rows="2"></textarea>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-top:18px;flex-wrap:wrap;gap:10px;">

<div style="font-weight:900;font-size:16px;">Items</div>

<button class="btn-lite" onclick="addRow()">+ Add Item</button>

</div>

<table>

<thead>
<tr>
<th style="width:45%">Product</th>
<th style="width:15%">Qty</th>
<th style="width:20%">Buying Price</th>
<th style="width:15%">Total</th>
<th style="width:5%"></th>
</tr>
</thead>

<tbody id="itemsBody"></tbody>

</table>

<div style="display:flex;justify-content:space-between;align-items:center;margin-top:18px;flex-wrap:wrap;gap:10px;">

<div class="total-box">
Total: Ksh <span id="grandTotal">0.00</span>
</div>

<button class="btn" onclick="submitReceive()">Receive Stock</button>

</div>
<div id="confirmModal" style="display:none"></div>
</div>


<script>

let products=[];

function showToast(message,type="success"){
const t=document.createElement("div");
t.className=`toast-msg toast-${type}`;
t.textContent=message;
document.getElementById("toast").appendChild(t);
setTimeout(()=>t.remove(),3000);
}

async function loadSuppliers(){
const res=await fetch("/purchases/suppliers",{credentials:"include"});
const data=await res.json();
const sel=document.getElementById("supplierSelect");

data.forEach(s=>{
const opt=document.createElement("option");
opt.value=s.id;
opt.textContent=s.name;
sel.appendChild(opt);
});
}

async function loadProducts(){
const res=await fetch("/purchases/products",{credentials:"include"});
products=await res.json();
}

function addRow(){

const tr=document.createElement("tr");

tr.innerHTML=`

<td>
<select class="prod"></select>
</td>

<td>
<input class="qty" type="number" value="1" min="1">
</td>

<td>
<input class="bp" type="number" step="0.01">
</td>

<td class="line-total">
Ksh <span class="lt">0.00</span>
</td>

<td>
<button class="danger">×</button>
</td>

`;

const select=tr.querySelector(".prod");

select.innerHTML=
`<option value="">Select product</option>`+
products.map(p=>`<option value="${p.id}">${p.name}</option>`).join("");

select.addEventListener("change",()=>{

const product=products.find(p=>p.id==select.value);

if(product && product.buying_price){
tr.querySelector(".bp").value=product.buying_price;
}

recalc(tr);

});

tr.querySelector(".danger").onclick=()=>{
tr.remove();
calcTotal();
};

tr.querySelectorAll("input").forEach(inp=>{
inp.addEventListener("input",()=>recalc(tr));
});

enableKeyboardFlow(tr);

document.getElementById("itemsBody").appendChild(tr);

calcTotal();

}

function enableKeyboardFlow(tr){

const inputs=tr.querySelectorAll("select,input");

inputs.forEach((el,i)=>{

el.addEventListener("keydown",function(e){

if(e.key==="Enter"){

e.preventDefault();

if(inputs[i+1]){

inputs[i+1].focus();

}else{

addRow();

const rows=document.querySelectorAll("#itemsBody tr");
rows[rows.length-1].querySelector(".prod").focus();

}

}

});

});

}

function recalc(tr){

const qty=parseFloat(tr.querySelector(".qty").value||0);
const price=parseFloat(tr.querySelector(".bp").value||0);

const total=qty*price;

tr.querySelector(".lt").textContent=total.toFixed(2);

calcTotal();

}

function calcTotal(){

let total=0;

document.querySelectorAll(".lt").forEach(el=>{
total+=parseFloat(el.textContent||0);
});

document.getElementById("grandTotal").textContent=total.toFixed(2);

}

function submitReceive(){

const supplierSelect = document.getElementById("supplierSelect");
const supplier_id = supplierSelect.value || null;
const supplier_name = supplierSelect.options[supplierSelect.selectedIndex].text;

const invoice_number = document.getElementById("invoiceNumber").value || "—";
const notes = document.getElementById("notes").value || null;

const items=[];

document.querySelectorAll("#itemsBody tr").forEach(tr=>{

const product_id=parseInt(tr.querySelector(".prod").value||0);
const quantity=parseInt(tr.querySelector(".qty").value||0);
const buying_price=parseFloat(tr.querySelector(".bp").value||0);

if(product_id && quantity>0){
items.push({product_id,quantity,buying_price});
}

});

if(items.length===0){
showToast("Add at least one item","error");
return;
}

const total=document.getElementById("grandTotal").textContent;

showConfirmModal({
supplier:supplier_name,
invoice:invoice_number,
total:total,
items:items.length,
payload:{supplier_id,invoice_number,notes,items}
});

}
function showConfirmModal(data){

const modal=document.getElementById("confirmModal");

modal.innerHTML=`

<div class="modal-overlay">

<div class="modal">

<div class="modal-title">
Confirm Stock Receipt
</div>

<div class="modal-details">

<div class="modal-row">
<span>Supplier</span>
<strong>${data.supplier}</strong>
</div>

<div class="modal-row">
<span>Invoice</span>
<strong>${data.invoice}</strong>
</div>

<div class="modal-row">
<span>Items</span>
<strong>${data.items}</strong>
</div>

<div class="modal-total">
Total: Ksh ${data.total}
</div>

</div>

<div class="modal-actions">

<button class="modal-cancel" onclick="closeConfirmModal()">
Cancel
</button>

<button class="modal-confirm" onclick="confirmReceive()">
Confirm Receive
</button>

</div>

</div>

</div>
`;

modal.style.display="block";

window.receivePayload=data.payload;

}


function closeConfirmModal(){
document.getElementById("confirmModal").style.display="none";
}


async function confirmReceive(){

const payload=window.receivePayload;

const res=await fetch("/purchases/receive_submit",{

method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify(payload)

});

const out=await res.json();

closeConfirmModal();

if(res.ok){

showToast(out.message||"Stock received");

document.getElementById("itemsBody").innerHTML="";
document.getElementById("invoiceNumber").value="";
document.getElementById("notes").value="";
addRow();

}else{

showToast(out.detail||"Failed","error");

}

}
(async function init(){

await loadSuppliers();
await loadProducts();
addRow();

})();

</script>

{% endblock %}
