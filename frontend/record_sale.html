{% extends "base.html" %}

{% block title_suffix %} | Record Sales{% endblock %}
{% block page_title %}Record Sales{% endblock %}

{% block content %}

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#635bff">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SmartPOS">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">

<link rel="stylesheet" href="https://rsms.me/inter/inter.css">

<style>
:root{
  --surface:#ffffff;
  --border:#dfe6ef;
  --text:#1a1f36;
  --muted:#6b7280;

  --primary:#635bff;
  --primary2:#7c3aed;

  --danger-bg:#fee2e2;
  --danger:#b91c1c;

  --shadow:0 10px 28px rgba(16,24,40,.08);
  --radius:14px;

  /* IMPORTANT: match your base.html layout */
  --pos-left: 260px;
  --pos-top: 86px;
  --pos-right: 0px;
  --pos-bottom-gap: 16px;

  --topbar-h: 74px;
  --bottombar-h: 84px;
}

*{box-sizing:border-box;}

.pos-fixed{
  position:fixed;
  left:var(--pos-left);
  right:var(--pos-right);
  top:var(--pos-top);
  bottom:0;
  padding:16px;
  z-index:50;
}

.pos-shell{
  height:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* TOP */
.pos-top{
  flex:0 0 auto;
  height:var(--topbar-h);
  padding:12px;
  border-bottom:1px solid var(--border);
  background:#fff;
  display:flex;
  align-items:center;
}

.sale-bar{
  width:100%;
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:10px;
}

.sale-bar input{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:10px;
  font-size:14px;
  background:#fff;
}

/* GRID */
.pos-grid{
  flex:1 1 auto;
  overflow:auto;
  background:#fff;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  min-width:980px;
}

thead th{
  position:sticky;
  top:0;
  z-index:3;
  background:#f1f4fb;
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.06em;
  padding:10px;
  border-bottom:1px solid var(--border);
}

tbody td{
  border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);
  padding:0;
}
tbody td:last-child{border-right:none;}

.cell{
  width:100%;
  border:none;
  padding:10px 10px;
  font-size:14px;
  background:#fff;
}
.cell:focus{
  outline:none;
  background:#f9faff;
  box-shadow:inset 0 0 0 2px rgba(99,91,255,.18);
}
.cell[readonly]{
  background:#f3f4f8;
  color:#111827;
}

.remove-btn{
  width:100%;
  height:100%;
  border:none;
  background:var(--danger-bg);
  color:var(--danger);
  font-weight:900;
  cursor:pointer;
}

/* BOTTOM */
.pos-bottom{
  flex:0 0 auto;
  height:var(--bottombar-h);
  padding:12px 14px;
  border-top:1px solid var(--border);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.total-box{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.total-label{
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.06em;
}

.total-value{
  font-size:36px;
  font-weight:900;
  line-height:1;
  color:var(--text);
}
.total-value span{color:var(--primary);}

.primary-btn{
  border:none;
  cursor:pointer;
  color:#fff;
  font-weight:900;
  border-radius:999px;
  padding:13px 22px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  font-size:15px;
}

#message{
  margin-top:10px;
  font-weight:800;
}
/* ===== FLOATING TOAST ===== */
#toast{
  position:fixed;
  top:110px;
  right:25px;
  z-index:9999;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.toast-msg{
  min-width:260px;
  padding:14px 18px;
  border-radius:10px;
  font-weight:700;
  color:white;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
  animation:toastIn .25s ease;
}

.toast-success{
  background:linear-gradient(135deg,#16a34a,#22c55e);
}

.toast-error{
  background:linear-gradient(135deg,#dc2626,#ef4444);
}

@keyframes toastIn{
  from{opacity:0;transform:translateX(20px);}
  to{opacity:1;transform:translateX(0);}
}
</style>
<!-- Toast Messages -->
<div id="toast"></div>
<div class="pos-fixed">
  <div class="pos-shell">

    <div class="pos-top">
      <div class="sale-bar">
        <input id="clientName" placeholder="Customer Name (optional)">
        <input id="salesPerson" placeholder="Sold By (optional)">
      </div>
    </div>

    <div class="pos-grid">
      <table>
        <thead>
          <tr>
            <th style="width:44%;">Product</th>
            <th style="width:13%;">Price</th>
            <th style="width:12%;">Stock</th>
            <th style="width:12%;">Qty</th>
            <th style="width:15%;">Total</th>
            <th style="width:4%;"></th>
          </tr>
        </thead>
        <tbody id="salesBody"></tbody>
      </table>
    </div>

    <div class="pos-bottom">
      <div class="total-box">
        <div class="total-label">Total Sale</div>
        <div class="total-value">Ksh <span id="grandTotal">0.00</span></div>
      </div>

      <button class="primary-btn" onclick="submitSale()">Record Sale</button>
    </div>

  </div>

  <p id="message"></p>
</div>

<datalist id="productList"></datalist>

<script>
const baseURL="https://pos-10-production.up.railway.app";
let allProducts=[];

const SEED_ROWS = 22;
const EXTEND_GUARD = 3;

async function loadProducts(){
  const res=await fetch(`${baseURL}/products/`,{credentials:"include"});
  allProducts=await res.json();

  productList.innerHTML=allProducts.map(p=>`<option value="${p.name}"></option>`).join("");

  for(let i=0;i<SEED_ROWS;i++) addRow();
  updateGrandTotal();
}

function addRow(){
  const row=document.createElement("tr");
  row.innerHTML=`
    <td><input class="cell prod" list="productList" placeholder="Search product…" oninput="updateProduct(this); ensureInfiniteGrid()"></td>
    <td><input class="cell price" type="number" oninput="ensureInfiniteGrid()"></td>
    <td><input class="cell stock" readonly></td>
    <td><input class="cell qty" type="number" min="1" oninput="updateTotal(this); ensureInfiniteGrid()"></td>
    <td><input class="cell lineTotal" readonly></td>
    <td><button class="remove-btn" onclick="this.closest('tr').remove();updateGrandTotal();ensureInfiniteGrid()">×</button></td>
  `;
  salesBody.appendChild(row);
}

function ensureInfiniteGrid(){
  while(salesBody.children.length < SEED_ROWS) addRow();
}

function updateProduct(input){
  const p=allProducts.find(x=>x.name.toLowerCase()===input.value.toLowerCase());
  if(!p) return;

  const r=input.closest("tr");
  r.querySelector(".price").value=p.price;
  r.querySelector(".stock").value=p.quantity;
}

function updateTotal(q){
  const r=q.closest("tr");
  const price=+r.querySelector(".price").value||0;
  r.querySelector(".lineTotal").value=(price*q.value).toFixed(2);
  updateGrandTotal();
}

function updateGrandTotal(){
  let t=0;
  document.querySelectorAll(".lineTotal").forEach(i=>t+=+i.value||0);
  grandTotal.textContent=t.toFixed(2);
}
function showToast(message,type="success"){
  const t=document.createElement("div");
  t.className=`toast-msg toast-${type}`;
  t.textContent=message;

  document.getElementById("toast").appendChild(t);

  setTimeout(()=>{
    t.style.opacity="0";
    t.style.transform="translateX(20px)";
    setTimeout(()=>t.remove(),300);
  },3000);
}
async function submitSale(){
  const items=[];
  document.querySelectorAll("#salesBody tr").forEach(r=>{
    const name=r.querySelector("input[list]")?.value;
    const q=+r.querySelector(".qty")?.value;
    const price=+r.querySelector(".price")?.value;
    if(name && q>0) items.push({product_name:name,quantity:q,selling_price:price});
  });

  if(!items.length){
  showToast("Add at least one product","error");
  return;
  }
  const res=await fetch(`${baseURL}/sales/record_sale/`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify({
      client_name:clientName.value||null,
      sales_person:salesPerson.value||null,
      items
    })
  });

  const out=await res.json();

  if(res.ok){
    showToast("Sale recorded successfully!","success");
    salesBody.innerHTML="";
    for(let i=0;i<SEED_ROWS;i++) addRow();
    updateGrandTotal();
  }else{
   showToast(out.detail||"Error recording sale","error");
  }
}

loadProducts();
</script>

{% endblock %}
