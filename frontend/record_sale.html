{% extends "base.html" %}

{% block title_suffix %} | Record Sales{% endblock %}
{% block page_title %}Record Sales{% endblock %}

{% block content %}

<link rel="stylesheet" href="https://rsms.me/inter/inter.css">

<style>
:root{
  --surface:#ffffff;
  --border:#dfe6ef;
  --text:#1a1f36;
  --muted:#6b7280;

  --primary:#635bff;
  --primary2:#7c3aed;

  --danger-bg:#fee2e2;
  --danger:#b91c1c;

  --shadow:0 10px 28px rgba(16,24,40,.08);
  --radius:14px;
}

*{box-sizing:border-box;}

/* ===== VIEWPORT LOCK ===== */
.pos-viewport{
  height:calc(100vh - 90px); /* adjust if needed */
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ===== MAIN WRAPPER ===== */
.pos-wrap{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* ===== POS SHELL ===== */
.pos-shell{
  flex:1;
  display:flex;
  flex-direction:column;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}

/* ---------- TOP ---------- */
.pos-top{
  padding:12px;
  border-bottom:1px solid var(--border);
  background:white;
}

.sale-bar{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:10px;
}

.sale-bar input{
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:10px;
}

/* ---------- GRID (ONLY SCROLL AREA) ---------- */
.pos-grid{
  flex:1;
  overflow-y:auto;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  min-width:980px;
}

thead th{
  position:sticky;
  top:0;
  background:#f1f4fb;
  font-size:12px;
  color:var(--muted);
  padding:10px;
  border-bottom:1px solid var(--border);
}

tbody td{
  border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);
  padding:0;
}
tbody td:last-child{border-right:none;}

.cell{
  width:100%;
  border:none;
  padding:10px;
}
.cell:focus{
  outline:none;
  background:#f9faff;
}
.cell[readonly]{background:#f3f4f8;}

.remove-btn{
  width:100%;
  border:none;
  background:var(--danger-bg);
  color:var(--danger);
  font-weight:800;
  cursor:pointer;
}

/* ---------- BOTTOM (ALWAYS VISIBLE) ---------- */
.pos-bottom{
  padding:12px 14px;
  border-top:1px solid var(--border);
  background:white;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.total-label{
  font-size:12px;
  color:var(--muted);
}

.total-value{
  font-size:34px;
  font-weight:900;
}

.primary-btn{
  border:none;
  color:white;
  font-weight:900;
  border-radius:999px;
  padding:13px 22px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  cursor:pointer;
}
</style>

<div class="pos-viewport">

<div class="pos-wrap">
<div class="pos-shell">

<!-- TOP -->
<div class="pos-top">
  <div class="sale-bar">
    <input id="clientName" placeholder="Customer Name (optional)">
    <input id="salesPerson" placeholder="Sold By (optional)">
  </div>
</div>

<!-- GRID -->
<div class="pos-grid">
<table>
<thead>
<tr>
<th style="width:44%">Product</th>
<th style="width:13%">Price</th>
<th style="width:12%">Stock</th>
<th style="width:12%">Qty</th>
<th style="width:15%">Total</th>
<th></th>
</tr>
</thead>
<tbody id="salesBody"></tbody>
</table>
</div>

<!-- BOTTOM -->
<div class="pos-bottom">
<div>
<div class="total-label">Total Sale</div>
<div class="total-value">Ksh <span id="grandTotal">0.00</span></div>
</div>

<button class="primary-btn" onclick="submitSale()">Record Sale</button>
</div>

</div>
<p id="message"></p>
</div>

</div>

<datalist id="productList"></datalist>

<script>
const baseURL="https://pos-10-production.up.railway.app";
let allProducts=[];

const SEED_ROWS=18;
const EXTEND_GUARD=2;

async function loadProducts(){
 const res=await fetch(`${baseURL}/products/`,{credentials:"include"});
 allProducts=await res.json();

 productList.innerHTML=allProducts.map(p=>`<option value="${p.name}"></option>`).join("");

 for(let i=0;i<SEED_ROWS;i++) addRow();
}

function addRow(){
 const row=document.createElement("tr");
 row.innerHTML=`
<td><input class="cell prod" list="productList" oninput="updateProduct(this);ensureInfiniteGrid()"></td>
<td><input class="cell price" type="number" oninput="ensureInfiniteGrid()"></td>
<td><input class="cell stock" readonly></td>
<td><input class="cell qty" type="number" min="1" oninput="updateTotal(this);ensureInfiniteGrid()"></td>
<td><input class="cell lineTotal" readonly></td>
<td><button class="remove-btn" onclick="this.closest('tr').remove();updateGrandTotal()">×</button></td>
`;
 salesBody.appendChild(row);
}

function ensureInfiniteGrid(){
 while(shouldExtend()) addRow();
}

function shouldExtend(){
 const rows=[...salesBody.querySelectorAll("tr")];
 const n=rows.length;
 for(let i=0;i<EXTEND_GUARD;i++){
  const r=rows[n-1-i];
  if(!r) return true;
  if(r.querySelector(".prod").value ||
     r.querySelector(".qty").value ||
     r.querySelector(".price").value) return true;
 }
 return false;
}

function updateProduct(input){
 const p=allProducts.find(x=>x.name.toLowerCase()===input.value.toLowerCase());
 if(!p)return;

 const r=input.closest("tr");
 r.querySelector(".price").value=p.price;
 r.querySelector(".stock").value=p.quantity;
}

function updateTotal(q){
 const r=q.closest("tr");
 const price=+r.querySelector(".price").value||0;
 r.querySelector(".lineTotal").value=(price*q.value).toFixed(2);
 updateGrandTotal();
}

function updateGrandTotal(){
 let t=0;
 document.querySelectorAll(".lineTotal").forEach(i=>t+=+i.value||0);
 grandTotal.textContent=t.toFixed(2);
}

async function submitSale(){
 const items=[];
 document.querySelectorAll("#salesBody tr").forEach(r=>{
  const name=r.querySelector(".prod").value;
  const q=+r.querySelector(".qty").value;
  const price=+r.querySelector(".price").value;
  if(name&&q>0)items.push({product_name:name,quantity:q,selling_price:price});
 });

 if(!items.length)return alert("Add at least one product");

 const res=await fetch(`${baseURL}/sales/record_sale/`,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  credentials:"include",
  body:JSON.stringify({
    client_name:clientName.value||null,
    sales_person:salesPerson.value||null,
    items
  })
 });

 const out=await res.json();

 if(res.ok){
  message.textContent="Sale recorded successfully!";
  salesBody.innerHTML="";
  for(let i=0;i<SEED_ROWS;i++) addRow();
  updateGrandTotal();
 }
}

loadProducts();
</script>

{% endblock %}
