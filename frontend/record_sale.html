{% extends "base.html" %}

{% block title_suffix %} | Record Sales{% endblock %}
{% block page_title %}Record Sales{% endblock %}

{% block content %}

<style>
:root{
  --border:#dfe3ea;
  --bg:#f4f6fb;
  --surface:#ffffff;
  --primary:#635bff;
  --text:#1a1f36;
}

/* PAGE */

.pos-container{
  max-width:1250px;
  margin:auto;
}

/* TOP BAR */

.sale-bar{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

.sale-bar input{
  padding:10px;
  border:1px solid var(--border);
  background:white;
}

/* GRID WORKSPACE */

.pos-grid{
  background:var(--surface);
  border:1px solid var(--border);
}

/* HEADER ROW */

.grid-header,
.grid-row{
  display:grid;
  grid-template-columns:
    3fr
    1fr
    1fr
    1fr
    1.2fr
    80px;
  align-items:center;
}

.grid-header{
  background:#f1f3f9;
  font-weight:700;
  font-size:12px;
  letter-spacing:.04em;
  border-bottom:1px solid var(--border);
}

.grid-header div{
  padding:10px;
}

/* ROWS */

.grid-row{
  border-bottom:1px solid var(--border);
}

.grid-row input{
  width:100%;
  border:none;
  border-right:1px solid var(--border);
  padding:10px;
  background:#fff;
}

.grid-row input:focus{
  outline:none;
  background:#f9faff;
}

.grid-row input[readonly]{
  background:#f3f4f8;
}

/* REMOVE BUTTON */

.remove-btn{
  border:none;
  background:#fee2e2;
  color:#b91c1c;
  height:100%;
  cursor:pointer;
}

/* ADD ROW */

.add-row{
  padding:10px;
}

.add-row button{
  background:var(--primary);
  color:white;
  border:none;
  padding:8px 14px;
  cursor:pointer;
}

/* CHECKOUT BAR */

.checkout{
  margin-top:10px;
  background:white;
  border:1px solid var(--border);
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.total{
  font-size:28px;
  font-weight:800;
}

.checkout button{
  background:var(--primary);
  color:white;
  border:none;
  padding:12px 24px;
  font-weight:700;
  cursor:pointer;
}
</style>

<div class="pos-container">

<div class="sale-bar">
<input id="clientName" placeholder="Customer Name">
<input id="salesPerson" placeholder="Sold By">
</div>

<div class="pos-grid">

<div class="grid-header">
<div>PRODUCT</div>
<div>PRICE</div>
<div>STOCK</div>
<div>QTY</div>
<div>TOTAL</div>
<div></div>
</div>

<div id="salesBody"></div>

<div class="add-row">
<button onclick="addRow()">+ Add Item</button>
</div>

</div>

<div class="checkout">
<div class="total">
Ksh <span id="grandTotal">0.00</span>
</div>

<button onclick="submitSale()">Record Sale</button>
</div>

<p id="message"></p>

</div>

<datalist id="productList"></datalist>

<script>
const baseURL="https://pos-10-production.up.railway.app";
let allProducts=[];

async function loadProducts(){
 const res=await fetch(`${baseURL}/products/`,{credentials:"include"});
 allProducts=await res.json();

 productList.innerHTML=allProducts.map(p=>`<option value="${p.name}"></option>`).join("");
 addRow();
}

function addRow(){
 const row=document.createElement("div");
 row.className="grid-row";

 row.innerHTML=`
<input list="productList" placeholder="Search product…" oninput="updateProduct(this)">
<input class="price" type="number">
<input class="stock" readonly>
<input class="qty" type="number" min="1" oninput="updateTotal(this)">
<input class="lineTotal" readonly>
<button class="remove-btn" onclick="this.parentElement.remove();updateGrandTotal()">X</button>
`;

 salesBody.appendChild(row);
}

function updateProduct(input){
 const p=allProducts.find(x=>x.name.toLowerCase()===input.value.toLowerCase());
 if(!p)return;

 const r=input.parentElement;
 r.querySelector(".price").value=p.price;
 r.querySelector(".stock").value=p.quantity;
}

function updateTotal(q){
 const r=q.parentElement;
 const price=+r.querySelector(".price").value||0;
 r.querySelector(".lineTotal").value=(price*q.value).toFixed(2);
 updateGrandTotal();
}

function updateGrandTotal(){
 let t=0;
 document.querySelectorAll(".lineTotal").forEach(i=>t+=+i.value||0);
 grandTotal.textContent=t.toFixed(2);
}

async function submitSale(){
 const items=[];
 document.querySelectorAll(".grid-row").forEach(r=>{
  const name=r.children[0].value;
  const q=+r.querySelector(".qty").value;
  const price=+r.querySelector(".price").value;
  if(name&&q>0)items.push({product_name:name,quantity:q,selling_price:price});
 });

 if(!items.length)return alert("Add at least one product");

 const res=await fetch(`${baseURL}/sales/record_sale/`,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  credentials:"include",
  body:JSON.stringify({
    client_name:clientName.value||null,
    sales_person:salesPerson.value||null,
    items
  })
 });

 const out=await res.json();

 if(res.ok){
  message.textContent="Sale recorded successfully!";
  salesBody.innerHTML="";
  addRow();
  updateGrandTotal();
 }else{
  message.textContent=out.detail||"Error recording sale";
 }
}

loadProducts();
</script>

{% endblock %}
