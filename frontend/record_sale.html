{% extends "base.html" %}

{% block title_suffix %} | Record Sales{% endblock %}
{% block page_title %}Record Sales{% endblock %}

{% block content %}

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#635bff">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SmartPOS">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">

<link rel="stylesheet" href="https://rsms.me/inter/inter.css">

<style>
:root{
  --bg:#f6f9fc;
  --surface:#ffffff;
  --border:#dfe6ef;
  --text:#1a1f36;
  --muted:#6b7280;

  --primary:#635bff;
  --primary2:#7c3aed;

  --danger-bg:#fee2e2;
  --danger:#b91c1c;

  --shadow:0 10px 28px rgba(16,24,40,.08);
  --radius:14px;
}

*{box-sizing:border-box;}

.pos-wrap{
  max-width:1250px;
  margin:auto;
}

/* POS SHELL: top + grid + bottom always visible */
.pos-shell{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;

  /* makes only the grid scroll */
  display:flex;
  flex-direction:column;

  /* try to fill viewport without breaking base.html */
  height:calc(100vh - 190px);
  min-height:520px;
}

/* ---------- TOP (sticky) ---------- */
.pos-top{
  padding:12px 12px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  position:sticky;
  top:0;
  z-index:5;
}

.sale-bar{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:10px;
}

.sale-bar input{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:10px;
  font-size:14px;
  background:#fff;
}
.sale-bar input:focus{
  outline:none;
  border-color:rgba(99,91,255,.55);
  box-shadow:0 0 0 3px rgba(99,91,255,.12);
}

/* ---------- GRID (scroll area) ---------- */
.pos-grid{
  flex:1;
  overflow:auto;
  background:#fff;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  min-width:980px;
}

/* Header stays visible while grid scrolls */
thead th{
  position:sticky;
  top:0; /* sticks within scroll area */
  z-index:3;
  background:#f1f4fb;
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.06em;
  padding:10px;
  border-bottom:1px solid var(--border);
}

tbody td{
  border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);
  padding:0;
}
tbody td:last-child{border-right:none;}

.cell{
  width:100%;
  border:none;
  padding:10px 10px;
  font-size:14px;
  background:#fff;
}
.cell:focus{
  outline:none;
  background:#f9faff;
  box-shadow:inset 0 0 0 2px rgba(99,91,255,.18);
}
.cell[readonly]{
  background:#f3f4f8;
  color:#111827;
}

.actions{
  height:100%;
}
.remove-btn{
  width:100%;
  height:100%;
  border:none;
  background:var(--danger-bg);
  color:var(--danger);
  font-weight:800;
  cursor:pointer;
}
.remove-btn:hover{filter:brightness(.98);}

/* ---------- BOTTOM (sticky) ---------- */
.pos-bottom{
  padding:12px 14px;
  border-top:1px solid var(--border);
  background:var(--surface);
  position:sticky;
  bottom:0;
  z-index:6;

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.total-box{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.total-label{
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.06em;
}
.total-value{
  font-size:34px;
  font-weight:900;
  color:var(--text);
  line-height:1.05;
}
.total-value span{color:var(--primary);}

.primary-btn{
  border:none;
  cursor:pointer;
  color:#fff;
  font-weight:900;
  border-radius:999px;
  padding:13px 22px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  font-size:15px;
}
.primary-btn:active{transform:translateY(1px);}

#message{
  margin-top:10px;
  font-weight:700;
  text-align:left;
}

@media(max-width:900px){
  .sale-bar{grid-template-columns:1fr;}
  table{min-width:920px;}
}
</style>

<div class="pos-wrap">

  <div class="pos-shell">

    <!-- TOP: always visible -->
    <div class="pos-top">
      <div class="sale-bar">
        <input id="clientName" placeholder="Customer Name (optional)">
        <input id="salesPerson" placeholder="Sold By (optional)">
      </div>
    </div>

    <!-- GRID: ONLY this scrolls -->
    <div class="pos-grid">
      <table>
        <thead>
          <tr>
            <th style="width:44%;">Product</th>
            <th style="width:13%;">Price</th>
            <th style="width:12%;">Stock</th>
            <th style="width:12%;">Qty</th>
            <th style="width:15%;">Total</th>
            <th style="width:4%;"></th>
          </tr>
        </thead>
        <tbody id="salesBody"></tbody>
      </table>
    </div>

    <!-- BOTTOM: always visible -->
    <div class="pos-bottom">
      <div class="total-box">
        <div class="total-label">Total Sale</div>
        <div class="total-value">Ksh <span id="grandTotal">0.00</span></div>
      </div>

      <!-- Keep your original logic entry-point -->
      <button class="primary-btn" onclick="submitSale()">Record Sale</button>
    </div>

  </div>

  <p id="message"></p>

</div>

<datalist id="productList"></datalist>

<script>
const baseURL="https://pos-10-production.up.railway.app";
let allProducts=[];

/* Build a grid that "feels unlimited" without a button */
const SEED_ROWS = 18;      // initial visible rows
const EXTEND_GUARD = 2;    // if last 2 rows have content, extend

async function loadProducts(){
  const res=await fetch(`${baseURL}/products/`,{credentials:"include"});
  allProducts=await res.json();

  productList.innerHTML=allProducts.map(p=>`<option value="${p.name}"></option>`).join("");

  // Seed the grid
  for(let i=0;i<SEED_ROWS;i++) addRow();
  updateGrandTotal();
}

function addRow(){
  const row=document.createElement("tr");
  row.innerHTML=`
    <td><input class="cell prod" list="productList" placeholder="Search product…" oninput="updateProduct(this); ensureInfiniteGrid()"></td>
    <td><input class="cell price" type="number" oninput="ensureInfiniteGrid()"></td>
    <td><input class="cell stock" readonly></td>
    <td><input class="cell qty" type="number" min="1" oninput="updateTotal(this); ensureInfiniteGrid()"></td>
    <td><input class="cell lineTotal" readonly></td>
    <td class="actions"><button class="remove-btn" onclick="this.closest('tr').remove();updateGrandTotal();ensureInfiniteGrid()">×</button></td>
  `;
  salesBody.appendChild(row);
}

/* Auto-extend rows forever as user types near bottom */
function ensureInfiniteGrid(){
  // Always keep at least SEED_ROWS rows
  while(salesBody.children.length < SEED_ROWS) addRow();

  // If any of the last EXTEND_GUARD rows has content, keep adding rows
  while(shouldExtend()){
    addRow();
  }
}

function shouldExtend(){
  const rows=[...salesBody.querySelectorAll("tr")];
  const n=rows.length;
  if(n < EXTEND_GUARD) return true;

  for(let i=0;i<EXTEND_GUARD;i++){
    if(rowHasData(rows[n-1-i])) return true;
  }
  return false;
}

function rowHasData(r){
  if(!r) return false;
  const prod=r.querySelector(".prod")?.value?.trim();
  const qty=r.querySelector(".qty")?.value?.trim();
  const price=r.querySelector(".price")?.value?.trim();
  return !!(prod || qty || price);
}

/* Your original product fill logic */
function updateProduct(input){
  const p=allProducts.find(x=>x.name.toLowerCase()===input.value.toLowerCase());
  if(!p) return;

  const r=input.closest("tr");
  r.querySelector(".price").value=p.price;
  r.querySelector(".stock").value=p.quantity;

  // if qty already entered, refresh totals
  const q=r.querySelector(".qty");
  if(q && q.value) updateTotal(q);
}

function updateTotal(q){
  const r=q.closest("tr");
  const price=+r.querySelector(".price").value||0;
  r.querySelector(".lineTotal").value=(price*q.value).toFixed(2);
  updateGrandTotal();
}

function updateGrandTotal(){
  let t=0;
  document.querySelectorAll(".lineTotal").forEach(i=>t+=+i.value||0);
  grandTotal.textContent=t.toFixed(2);
}

/* KEEP your original submit logic exactly (same payload + endpoint) */
async function submitSale(){
  const items=[];
  document.querySelectorAll("#salesBody tr").forEach(r=>{
    const name=r.querySelector("input[list]")?.value;
    const q=+r.querySelector(".qty")?.value;
    const price=+r.querySelector(".price")?.value;
    if(name && q>0) items.push({product_name:name,quantity:q,selling_price:price});
  });

  if(!items.length) return alert("Add at least one product");

  const res=await fetch(`${baseURL}/sales/record_sale/`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify({
      client_name:clientName.value||null,
      sales_person:salesPerson.value||null,
      items
    })
  });

  const out=await res.json();

  if(res.ok){
    message.style.color="green";
    message.textContent="Sale recorded successfully!";
    salesBody.innerHTML="";
    for(let i=0;i<SEED_ROWS;i++) addRow();
    updateGrandTotal();
  }else{
    message.style.color="red";
    message.textContent=out.detail||"Error recording sale";
  }
}

loadProducts();
</script>

{% endblock %}
