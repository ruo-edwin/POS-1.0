{% extends "base.html" %}

{% block title_suffix %} | Record Sales{% endblock %}
{% block page_title %}Record Sales{% endblock %}

{% block content %}

<link rel="stylesheet" href="https://rsms.me/inter/inter.css">

<style>
:root{
  --bg:#f6f9fc;
  --card:#ffffff;
  --border:#e6ebf1;
  --text:#1a1f36;
  --muted:#697386;

  --primary:#635bff;
  --primary-2:#7c3aed;

  --radius:14px;
  --shadow:0 8px 24px rgba(16,24,40,.08);
}

.page-wrap{
  max-width:1200px;
  margin:auto;
}

/* HEADER */
.page-header{
  margin-bottom:18px;
}

.page-header h1{
  margin:0;
  font-size:24px;
  font-weight:700;
}

/* CARDS */

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}

.card-title{
  font-size:13px;
  font-weight:700;
  margin-bottom:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.05em;
}

/* SALE INFO */

.order-info{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.order-info input{
  padding:11px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:14px;
}

/* TABLE */

.table-wrapper{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:900px;
}

th{
  font-size:12px;
  color:var(--muted);
  text-align:left;
  padding:10px;
  border-bottom:1px solid var(--border);
}

td{
  padding:8px;
  border-bottom:1px solid var(--border);
}

td input{
  width:100%;
  padding:9px;
  border-radius:7px;
  border:1px solid var(--border);
  background:#fafbff;
}

td input:focus{
  outline:none;
  border-color:var(--primary);
  background:white;
}

td input[readonly]{
  background:#eef2ff;
}

/* BUTTONS */

.primary-btn{
  background:linear-gradient(135deg,var(--primary),var(--primary-2));
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
}

.remove-btn{
  background:#fee2e2;
  color:#b91c1c;
  border:none;
  padding:7px 12px;
  border-radius:7px;
  cursor:pointer;
}

/* ADD ITEM */

.add-row{
  margin-top:14px;
}

/* STICKY POS BAR */

.checkout-bar{
  position:fixed;
  bottom:0;
  left:260px; /* aligns after sidebar */
  right:0;
  background:white;
  border-top:1px solid var(--border);
  padding:16px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 -8px 20px rgba(0,0,0,.06);
  z-index:100;
}

.total-display{
  font-size:32px;
  font-weight:800;
  letter-spacing:.5px;
}

.total-display span{
  color:var(--primary);
}

.checkout-btn{
  font-size:16px;
  padding:14px 28px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,var(--primary),var(--primary-2));
  color:white;
  font-weight:700;
  cursor:pointer;
}

#message{
  margin-top:10px;
  font-weight:600;
}

body{
  padding-bottom:110px;
}

@media(max-width:900px){
  .order-info{
    grid-template-columns:1fr;
  }
  .checkout-bar{
    left:0;
  }
}
</style>

<div class="page-wrap">

<div class="page-header">
  <h1>Record Sale</h1>
</div>

<!-- SALE DETAILS -->
<div class="card">
  <div class="card-title">Sale Details</div>

  <div class="order-info">
    <input id="clientName" placeholder="Customer Name (optional)">
    <input id="salesPerson" placeholder="Sold By (optional)">
  </div>
</div>

<!-- ITEMS -->
<div class="card">

  <div class="card-title">Items</div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Qty</th>
          <th>Total</th>
          <th></th>
        </tr>
      </thead>

      <tbody id="salesBody"></tbody>
    </table>
  </div>

  <div class="add-row">
    <button class="primary-btn" onclick="addRow()">+ Add Item</button>
  </div>

</div>

<p id="message"></p>

</div>

<!-- 🔥 REAL POS CHECKOUT BAR -->
<div class="checkout-bar">

  <div class="total-display">
    Total: Ksh <span id="grandTotal">0.00</span>
  </div>

  <button class="checkout-btn" onclick="submitSale()">
    Record Sale
  </button>

</div>

<datalist id="productList"></datalist>

<script>
const baseURL="https://pos-10-production.up.railway.app";
let allProducts=[];

async function loadProducts(){
 const res=await fetch(`${baseURL}/products/`,{credentials:"include"});
 allProducts=await res.json();

 productList.innerHTML=allProducts.map(p=>`<option value="${p.name}"></option>`).join("");
 addRow();
}

function addRow(){
 const row=document.createElement("tr");
 row.innerHTML=`
<td><input list="productList" placeholder="Search product…" oninput="updateProduct(this)"></td>
<td><input class="price" type="number"></td>
<td><input class="stock" readonly></td>
<td><input class="qty" type="number" min="1" oninput="updateTotal(this)"></td>
<td><input class="lineTotal" readonly></td>
<td><button class="remove-btn" onclick="this.closest('tr').remove();updateGrandTotal()">Remove</button></td>
`;
 salesBody.appendChild(row);
}

function updateProduct(input){
 const p=allProducts.find(x=>x.name.toLowerCase()===input.value.toLowerCase());
 if(!p)return;

 const r=input.closest("tr");
 r.querySelector(".price").value=p.price;
 r.querySelector(".stock").value=p.quantity;
}

function updateTotal(q){
 const r=q.closest("tr");
 const price=+r.querySelector(".price").value||0;
 r.querySelector(".lineTotal").value=(price*q.value).toFixed(2);
 updateGrandTotal();
}

function updateGrandTotal(){
 let t=0;
 document.querySelectorAll(".lineTotal").forEach(i=>t+=+i.value||0);
 grandTotal.textContent=t.toFixed(2);
}

async function submitSale(){
 const items=[];
 document.querySelectorAll("#salesBody tr").forEach(r=>{
  const name=r.querySelector("input[list]").value;
  const q=+r.querySelector(".qty").value;
  const price=+r.querySelector(".price").value;
  if(name&&q>0)items.push({product_name:name,quantity:q,selling_price:price});
 });

 if(!items.length)return alert("Add at least one product");

 const res=await fetch(`${baseURL}/sales/record_sale/`,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  credentials:"include",
  body:JSON.stringify({
    client_name:clientName.value||null,
    sales_person:salesPerson.value||null,
    items
  })
 });

 const out=await res.json();

 if(res.ok){
  message.style.color="green";
  message.textContent="Sale recorded successfully!";
  salesBody.innerHTML="";
  addRow();
  updateGrandTotal();
 }else{
  message.style.color="red";
  message.textContent=out.detail||"Error recording sale";
 }
}

loadProducts();
</script>

{% endblock %}
