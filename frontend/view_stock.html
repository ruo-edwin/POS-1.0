{% extends "base.html" %}

{% block title_suffix %} | Inventory{% endblock %}
{% block page_title %}Inventory{% endblock %}

{% block content %}

<style>

.inventory-cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
margin-bottom:22px;
}

.card{
background:#fff;
border:1px solid #e6ebf1;
border-radius:14px;
padding:18px;
}

.card-title{
font-size:13px;
color:#697386;
margin-bottom:6px;
}

.card-value{
font-size:24px;
font-weight:700;
}

.inventory-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.search-box input{
padding:10px 14px;
border:1px solid #dfe6ef;
border-radius:10px;
width:260px;
}

.add-btn{
background:#635bff;
color:white;
padding:10px 16px;
border-radius:10px;
text-decoration:none;
font-weight:600;
}

.table-box{
background:#fff;
border:1px solid #e6ebf1;
border-radius:14px;
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#f6f9fc;
}

th{
text-align:left;
padding:12px;
font-size:12px;
color:#697386;
text-transform:uppercase;
letter-spacing:.05em;
}

td{
padding:12px;
border-top:1px solid #eef2f7;
}

.action-btn{
background:#635bff;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:13px;
margin-right:6px;
}

.history-btn{
background:#eef2ff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

</style>


<!-- INVENTORY CARDS -->

<div class="inventory-cards">

<div class="card">
<div class="card-title">Stock Value</div>
<div class="card-value" id="stockValue">Ksh 0</div>
</div>

<div class="card">
<div class="card-title">Low Stock Items</div>
<div class="card-value" id="lowStock">0</div>
</div>

<div class="card">
<div class="card-title">Products</div>
<div class="card-value" id="totalProducts">0</div>
</div>

<div class="card">
<div class="card-title">Potential Profit</div>
<div class="card-value" id="profitValue">Ksh 0</div>
</div>

</div>


<!-- SEARCH + ADD -->

<div class="inventory-top">

<div class="search-box">
<input id="searchProduct" placeholder="Search product..." oninput="filterProducts()">
</div>

<a class="add-btn" href="/products/addproduct">+ Add Product</a>

</div>



<!-- PRODUCT TABLE -->

<div class="table-box">

<table id="productTable">

<thead>
<tr>
<th>Product</th>
<th>Stock</th>
<th>Buying Price</th>
<th>Value</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<script>

let products=[];

async function loadInventory(){

const res = await fetch("/products/",{credentials:"include"});
products = await res.json();

renderTable(products);
updateMetrics();

}

function renderTable(list){

const tbody=document.querySelector("#productTable tbody");
tbody.innerHTML="";

list.forEach(p=>{

const value=(p.quantity * (p.buying_price || 0));

const row=document.createElement("tr");

row.innerHTML=`

<td>${p.name}</td>

<td>${p.quantity}</td>

<td>Ksh ${p.buying_price || 0}</td>

<td>Ksh ${value}</td>

<td>

<button class="action-btn" onclick="adjustStock(${p.id})">
Adjust
</button>

<button class="history-btn" onclick="viewHistory(${p.id})">
History
</button>

</td>

`;

tbody.appendChild(row);

});

}

function filterProducts(){

const term=document.getElementById("searchProduct").value.toLowerCase();

const filtered = products.filter(p =>
p.name.toLowerCase().includes(term)
);

renderTable(filtered);

}

function updateMetrics(){

let stockValue=0;
let profit=0;
let low=0;

products.forEach(p=>{

stockValue += p.quantity * (p.buying_price || 0);

profit += p.quantity * ((p.price||0)-(p.buying_price||0));

if(p.quantity <=3) low++;

});

document.getElementById("stockValue").textContent="Ksh "+stockValue.toLocaleString();
document.getElementById("profitValue").textContent="Ksh "+profit.toLocaleString();
document.getElementById("totalProducts").textContent=products.length;
document.getElementById("lowStock").textContent=low;

}

function adjustStock(id){

window.location.href = "/products/adjust/"+id;

}

function viewHistory(id){

window.location.href = "/products/history/"+id;

}

loadInventory();

</script>

{% endblock %}
