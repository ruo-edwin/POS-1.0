{% extends "base.html" %}

{% block title_suffix %} | View / Update Stocks{% endblock %}
{% block page_title %}Inventory{% endblock %}

{% block content %}

<style>

.stock-card{
  background:#fff;
  border:1px solid #e6ebf1;
  border-radius:14px;
  padding:26px;
}

.stock-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.stock-title{
  font-size:18px;
  font-weight:700;
}

.add-btn{
  background:linear-gradient(135deg,#635bff,#7c3aed);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
}

.add-btn:hover{
  opacity:.9;
}

/* table */

.table-wrap{
  border:1px solid #e6ebf1;
  border-radius:12px;
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  background:#f6f9fc;
}

th{
  padding:12px;
  text-align:left;
  font-size:12px;
  text-transform:uppercase;
  color:#697386;
  letter-spacing:.06em;
}

td{
  padding:12px;
  border-top:1px solid #eef2f7;
}

tr:hover{
  background:#f9fafc;
}

/* inputs */

td input{
  width:100px;
  padding:7px;
  border-radius:8px;
  border:1px solid #dfe6ef;
  background:#f8fafc;
}

/* update button */

.update-btn{
  border:none;
  background:#16a34a;
  color:white;
  padding:8px 14px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

.update-btn:hover{
  opacity:.9;
}

#message{
  margin-top:16px;
  font-weight:600;
}

</style>

<div class="stock-card">

  <div class="stock-header">
      <div class="stock-title">Product Stock Management</div>

      <a class="add-btn" href="/products/addproduct">
        + Add Product
      </a>
  </div>

  <div class="table-wrap">

    <table id="stockTable">

      <thead>
        <tr>
          <th>ID</th>
          <th>Product</th>
          <th>Quantity</th>
          <th>Selling Price</th>
          <th>Buying Price</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody></tbody>

    </table>

  </div>

  <p id="message"></p>

</div>


<script>

async function fetchStocks(){

  try{

    const res = await fetch("/products/",{credentials:"include"});
    const data = await res.json();

    const tbody = document.querySelector("#stockTable tbody");
    tbody.innerHTML="";

    data.forEach(product => {

      const row=document.createElement("tr");

      row.innerHTML=`

        <td>${product.id}</td>

        <td>${product.name}</td>

        <td>
          <input type="number" value="${product.quantity}" id="qty-${product.id}">
        </td>

        <td>
          <input type="number" step="0.01" value="${product.price}" id="price-${product.id}">
        </td>

        <td>
          <input type="number" step="0.01" value="${product.buying_price}" id="buying-${product.id}">
        </td>

        <td>
          <button class="update-btn" onclick="updateProduct(${product.id})">
            Update
          </button>
        </td>

      `;

      tbody.appendChild(row);

    });

  }
  catch(err){

    const msg=document.getElementById("message");
    msg.style.color="red";
    msg.textContent="Failed to load products.";

  }

}


async function updateProduct(id){

  const quantity=parseInt(document.getElementById(`qty-${id}`).value);
  const price=parseFloat(document.getElementById(`price-${id}`).value);
  const buying_price=parseFloat(document.getElementById(`buying-${id}`).value);

  try{

    const response = await fetch(`/products/update_stock/${id}`,{

      method:"PUT",

      headers:{
        "Content-Type":"application/json"
      },

      credentials:"include",

      body:JSON.stringify({
        quantity,
        price,
        buying_price
      })

    });

    const result=await response.json();

    const msg=document.getElementById("message");

    if(response.ok){

      msg.style.color="green";
      msg.textContent=result.message || "Product updated successfully.";

    }else{

      msg.style.color="red";
      msg.textContent=result.detail || "Failed to update product.";

    }

  }
  catch(err){

    const msg=document.getElementById("message");
    msg.style.color="red";
    msg.textContent="Network error.";

  }

}


fetchStocks();

</script>

{% endblock %}
